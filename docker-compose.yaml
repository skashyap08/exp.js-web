version: "3.9"

services:
  express-app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: express-web2

    ports:
      - "4000:4000"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    restart: unless-stopped

    command: npm run dev